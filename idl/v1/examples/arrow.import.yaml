caption: Import a primitive's rows from a Parquet file written by export.
steps:
  - call: kv.put
    args: { key: greeting, value: hello }
  - call: arrow.export
    args: { primitive: kv, format: parquet, path: "{tmpdir}/kv.parquet" }
  - call: kv.delete
    args: { key: greeting }
  - call: arrow.import
    args: { file_path: "{tmpdir}/kv.parquet", target: kv }
    note: Rows are keyed by their source column; kv restores greeting=hello.
  - call: kv.get
    args: { key: greeting }
    returns: hello
