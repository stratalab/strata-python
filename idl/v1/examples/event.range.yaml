caption: Read a range of events by sequence.
steps:
  - call: event.append
    args: { event_type: user.created, payload: { id: 1 } }
  - call: event.append
    args: { event_type: user.updated, payload: { id: 2 } }
  - call: event.range
    args: { start_seq: 0, direction: forward }
    returns: [ { id: 1 }, { id: 2 } ]
