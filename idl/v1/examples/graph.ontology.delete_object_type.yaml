caption: Remove an object type from the ontology.
steps:
  - call: graph.create
    args: { graph: g }
  - call: graph.ontology.define_object_type
    args: { graph: g, name: person }
  - call: graph.ontology.define_object_type
    args: { graph: g, name: company }
  - call: graph.ontology.delete_object_type
    args: { graph: g, name: company }
  - call: graph.ontology.summary
    args: { graph: g }
    returns: ["person"]
