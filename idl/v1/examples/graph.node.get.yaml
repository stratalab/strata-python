caption: Read a node's properties, or nothing if absent.
steps:
  - call: graph.create
    args: { graph: social }
  - call: graph.node.add
    args: { graph: social, node_id: alice, object_type: person, properties: { age: 30 } }
  - call: graph.node.get
    args: { graph: social, node_id: alice }
    returns: { age: 30 }
  - call: graph.node.get
    args: { graph: social, node_id: absent }
    returns: null
