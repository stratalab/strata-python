caption: Read many vectors at once.
steps:
  - call: vector.collection.create
    args: { collection: docs, dimension: 3, metric: cosine }
  - call: vector.batch_upsert
    args:
      collection: docs
      entries:
        - { key: a, vector: [1.0, 0.0, 0.0] }
        - { key: b, vector: [0.0, 1.0, 0.0] }
  - call: vector.batch_get
    args: { collection: docs, keys: [a, b] }
    returns: ["a", "b"]
