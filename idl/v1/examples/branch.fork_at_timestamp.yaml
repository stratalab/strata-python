caption: Fork a branch at an earlier commit timestamp — time-travel into a branch.
steps:
  - call: kv.put
    args: { key: greeting, value: original }
    bind: base
    note: The receipt carries this commit's timestamp (microseconds).
  - call: kv.put
    args: { key: greeting, value: updated }
  - call: branch.fork_at_timestamp
    args: { source: default, branch: snapshot, timestamp: "{base.commit.timestamp}" }
    note: snapshot forks default's history as of that instant.
  - call: kv.get
    args: { key: greeting, branch: snapshot }
    returns: original
