caption: Add a node with an object type and properties.
steps:
  - call: graph.create
    args: { graph: social }
  - call: graph.node.add
    args: { graph: social, node_id: alice, object_type: person, properties: { age: 30 } }
  - call: graph.node.get
    args: { graph: social, node_id: alice }
    returns: { age: 30 }
