name: Release to PyPI

# Builds one abi3 wheel per platform (Python 3.9+) and publishes to PyPI via
# trusted publishing. Each build pins the engine to the rev in
# idl/v1/STRATA_CORE_REV (tools/release_prep.py); strata-core is public, so
# no git auth is needed.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  # abi3 forward-compat: a single wheel serves this and later 3.x.
  MATURIN_ARGS: "--release --out dist"

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: ubuntu-latest, target: x86_64, manylinux: auto }
          - { runner: ubuntu-24.04-arm, target: aarch64, manylinux: auto }
          - { runner: ubuntu-latest, target: x86_64, manylinux: musllinux_1_2 }
          - { runner: ubuntu-24.04-arm, target: aarch64, manylinux: musllinux_1_2 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Pin engine rev
        run: python tools/release_prep.py
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          target: ${{ matrix.platform.target }}
          args: ${{ env.MATURIN_ARGS }}
          sccache: 'true'
          manylinux: ${{ matrix.platform.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}-${{ matrix.platform.manylinux }}
          path: dist

  macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Pin engine rev
        run: python tools/release_prep.py
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          target: ${{ matrix.target }}
          args: ${{ env.MATURIN_ARGS }}
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Pin engine rev
        run: python tools/release_prep.py
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: 'true'
        with:
          args: ${{ env.MATURIN_ARGS }}
          sccache: 'true'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Pin engine rev
        run: python tools/release_prep.py
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/stratadb
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
